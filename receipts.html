<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1,viewport-fit=cover" name="viewport"/><meta content="#2f8f57" name="theme-color"/><meta content="yes" name="apple-mobile-web-app-capable"/><meta content="default" name="apple-mobile-web-app-status-bar-style"/><link href="manifest.webmanifest" rel="manifest"/><link href="assets/app-icon.svg" rel="icon"/><title>Receipts · Sulit</title><link href="css/styles.css" rel="stylesheet"/><link href="css/appstore.css" rel="stylesheet"/><link href="css/ios-green.css" rel="stylesheet"/></head><body><div class="app"><header><div class="brand-header"><div><h1>Receipts</h1><p>Your uploaded grocery receipts.</p></div><a class="header-action" href="profile.html">‹</a></div></header><main><div class="receipt-grid" id="receiptGrid"></div></main><nav class="nav"><a href="add.html"><span class="nav-icon"><svg aria-hidden="true" viewbox="0 0 24 24"><path class="icon-soft" d="M3.5 10.5 12 3.5l8.5 7v9a1.5 1.5 0 0 1-1.5 1.5H5a1.5 1.5 0 0 1-1.5-1.5z"></path><path d="M8.5 21v-7h7v7"></path><path d="m3.5 10.5 8.5-7 8.5 7"></path></svg></span>Home</a><a href="list.html"><span class="nav-icon"><svg aria-hidden="true" viewbox="0 0 24 24"><rect class="icon-soft" height="17" rx="3" width="16" x="4" y="3.5"></rect><path d="M8 8h8M8 12h8M8 16h5"></path><circle cx="6.5" cy="8" r=".6"></circle><circle cx="6.5" cy="12" r=".6"></circle><circle cx="6.5" cy="16" r=".6"></circle></svg></span>List</a><a href="stores.html"><span class="nav-icon"><svg aria-hidden="true" viewbox="0 0 24 24"><path class="icon-soft" d="M4 9h16v10.5A1.5 1.5 0 0 1 18.5 21h-13A1.5 1.5 0 0 1 4 19.5z"></path><path d="M3 9h18l-1.7-5H4.7z"></path><path d="M8 21v-6h8v6M7 9v2.2a2 2 0 0 0 4 0V9M11 9v2.2a2 2 0 0 0 4 0V9M15 9v2.2a2 2 0 0 0 4 0V9"></path></svg></span>Stores</a><a href="savings.html"><span class="nav-icon"><svg aria-hidden="true" viewbox="0 0 24 24"><circle class="icon-soft" cx="12" cy="12" r="9"></circle><path d="M14.8 8.5c-.7-.7-1.6-1-2.8-1-1.8 0-3.1.9-3.1 2.3 0 1.5 1.4 2 3.2 2.4 1.7.4 3.1.9 3.1 2.5 0 1.5-1.4 2.6-3.4 2.6-1.3 0-2.5-.4-3.3-1.3M12 5.8v12.4"></path></svg></span>Savings</a><a href="profile.html"><span class="nav-icon"><svg aria-hidden="true" viewbox="0 0 24 24"><circle class="icon-soft" cx="12" cy="8" r="4"></circle><path class="icon-soft" d="M4.5 21c.7-4.4 3.2-6.7 7.5-6.7s6.8 2.3 7.5 6.7z"></path><circle cx="12" cy="8" r="4"></circle><path d="M4.5 21c.7-4.4 3.2-6.7 7.5-6.7s6.8 2.3 7.5 6.7"></path></svg></span>Profile</a></nav></div><div class="receipt-viewer" id="receiptViewer" onclick="this.classList.remove('show')"><div class="receipt-paper" onclick="event.stopPropagation()"><button class="viewer-close" onclick="document.getElementById('receiptViewer').classList.remove('show')">×</button><div id="receiptViewerContent"></div></div></div><script src="js/data.js"></script><script>
const receipts = JSON.parse(localStorage.getItem('receipts') || '[]')
  .sort((a,b) => new Date(b.receiptDate || b.createdAt) - new Date(a.receiptDate || a.createdAt));
const grid = document.getElementById('receiptGrid');

grid.innerHTML = receipts.length ? receipts.map((r,i) => `
  <article class="receipt-thumb" onclick="openReceipt(${i})">
    <div class="receipt-mini">🧾</div>
    <b>${storeById(Number(r.storeId))?.name || 'Grocery Receipt'}</b>
    <small>${new Date(r.receiptDate || r.createdAt || Date.now()).toLocaleDateString()}</small>
    <strong>${money(Number(r.totalSpent || 0))}</strong>
  </article>`).join('') : `
  <div class="empty">
    <strong>No receipts yet.</strong>
    <div class="muted">Receipts will appear here after scanning.</div>
  </div>`;

function receiptItemRows(receipt) {
  const items = Array.isArray(receipt.items) ? receipt.items : [];
  if (!items.length) {
    return `<div class="empty">The receipt total was saved, but no itemized products were available for this receipt.</div>`;
  }
  return items.map(item => {
    const quantity = Number(item.quantity || 1);
    const unit = Number(item.unitPrice || 0);
    const line = Number(item.price || unit * quantity);
    return `<div class="digital-receipt-row">
      <div><strong>${item.name || item.rawName || 'Item'}</strong><small>${quantity} × ${money(unit)}</small></div>
      <b>${money(line)}</b>
    </div>`;
  }).join('');
}

function openReceipt(i) {
  const r = receipts[i];
  const store = storeById(Number(r.storeId));
  document.getElementById('receiptViewerContent').innerHTML = `
    <div class="digital-receipt-head">
      <h2>${store?.name || 'Grocery Receipt'}</h2>
      <p>${new Date(r.receiptDate || r.createdAt || Date.now()).toLocaleString()}</p>
    </div>
    <div class="digital-receipt-items">${receiptItemRows(r)}</div>
    <div class="digital-receipt-total"><span>Total</span><strong>${money(Number(r.totalSpent || 0))}</strong></div>`;
  document.getElementById('receiptViewer').classList.add('show');
}

const requestedId = decodeURIComponent(location.hash.slice(1));
if (requestedId) {
  const index = receipts.findIndex(receipt => String(receipt.id) === requestedId);
  if (index >= 0) openReceipt(index);
}
</script><script>if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}</script></body></html>
